syntax = "proto3";

package minotor.timetable;

message Route {
  /**
   * Arrivals and departures encoded as a 16 bit uint array.
   * Format: [arrival1, departure1, arrival2, departure2, etc.]
   */
  bytes stopTimes = 1;
  /**
   * PickUp and DropOff types represented as an 8 bit uint array.
   * Values:
   *   0: REGULAR
   *   1: NOT_AVAILABLE
   *   2: MUST_PHONE_AGENCY
   *   3: MUST_COORDINATE_WITH_DRIVER
   * Format: [drop_off_1][pickup_1][drop_off_0][pickup_0]
   * 2 bits per value
   */
  bytes pickUpDropOffTypes = 2;
  /**
   * Stops encoded as a 32 bit uint array.
   * When useParentStations is true, these are parent station IDs (for routing).
   * Format: [stop1, stop2, stop3, etc.]
   */
  bytes stops = 3;
  uint32 serviceRouteId = 4;
  /**
   * Original child stop IDs encoded as a 32 bit uint array.
   * Only populated when useParentStations is true AND at least one stop
   * in this route was collapsed to its parent station.
   * Used for route reconstruction to show the actual platform/stop.
   * Format: [trip0_stop0, trip0_stop1, ..., trip1_stop0, trip1_stop1, ...]
   * Length: numStops * numTrips (flattened per-trip original stops)
   */
  optional bytes originalStops = 5;
}

enum TransferType {
  RECOMMENDED_TRANSFER_POINT = 0;
  TIMED_TRANSFER = 1;
  REQUIRES_MINIMAL_TIME = 2;
  IN_SEAT_TRANSFER = 3;
}

message Transfer {
  uint32 destination = 1;
  TransferType type = 2;
  optional uint32 minTransferTime = 3;
}

message TripStop {
  uint32 stopIndex = 1;
  uint32 routeId = 2;
  uint32 tripIndex = 3;
}

message TripTransferEntry {
  TripStop origin = 1;
  repeated TripStop destinations = 2;
}

message StopAdjacency {
  repeated uint32 routes = 1;
  repeated Transfer transfers = 2;
}

enum RouteType {
  TRAM = 0;
  SUBWAY = 1;
  RAIL = 2;
  BUS = 3;
  FERRY = 4;
  CABLE_TRAM = 5;
  AERIAL_LIFT = 6;
  FUNICULAR = 7;
  TROLLEYBUS = 8;
  MONORAIL = 9;
}

message ServiceRoute {
  RouteType type = 1;
  string name = 2;
  repeated uint32 routes = 3;
}

message ParentStationTransferTime {
  uint32 stationId = 1;
  uint32 transferTimeSeconds = 2;
}

message Timetable {
  string version = 1;
  repeated StopAdjacency stopsAdjacency = 2;
  repeated Route routesAdjacency = 3;
  repeated ServiceRoute serviceRoutes = 4;
  repeated TripTransferEntry tripContinuations = 5;
  repeated TripTransferEntry guaranteedTripTransfers = 6;
  /**
   * Flag indicating whether parent station mode is enabled.
   * When true, routing uses parent stations instead of individual child stops,
   * and originalStops in Route contains the actual platform/stop IDs.
   */
  bool useParentStations = 7;
  /**
   * Inferred transfer times at parent stations (median of child-to-child transfers).
   * Only populated when useParentStations is true and there are multiple children
   * with explicit transfer times defined between them.
   */
  repeated ParentStationTransferTime parentStationTransferTimes = 8;
}
